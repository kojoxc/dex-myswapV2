name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  solidity:
    name: Solidity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Foundry version
        run: forge --version

      - name: Build
        run: forge build

      - name: Run tests
        run: forge test

      - name: Run coverage
        run: forge coverage --report lcov

      - name: Check gas snapshot
        run: forge snapshot --check

      - name: Run Slither
        continue-on-error: true
        uses: crytic/slither-action@v0.4.0
        with:
          target: "src/"
          slither-args: --filter-paths "lib|test|script|frontend"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
