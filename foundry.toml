[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200
fs_permissions = [
    { access = "read-write", path = "./deployments" },
    { access = "read-write", path = "./frontend/public/deployments" }
]

[fuzz]
runs = 128

[invariant]
runs = 32
depth = 64
fail_on_revert = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
